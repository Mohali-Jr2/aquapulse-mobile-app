name: aquapulse_smart_water_user_app
description: A modern Flutter mobile app for Smart Water Metering System users.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '^3.11.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # HTTP REQUESTS
  http: ^1.2.2

  # OPEN LINKS / DOWNLOAD REPORTS
  url_launcher: ^6.3.0

  # CHARTS
  fl_chart: ^1.2.0

  # ICONS
  font_awesome_flutter: ^11.0.0

  # STATE MANAGEMENT
  provider: ^6.1.2

  # LOCAL STORAGE
  shared_preferences: ^2.5.5

  # DATE FORMATTING
  intl: ^0.20.2

  # SVG SUPPORT
  flutter_svg: ^2.0.10+1

  # ANIMATIONS
  lottie: ^3.1.2

  # LOADING ANIMATIONS
  flutter_spinkit: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/